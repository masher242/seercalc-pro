[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Fallback redirects (the static dist/_redirects file, generated from public/_redirects,
# already covers /blog and /blog/* with clean URLs -> matching prerendered .html files).
# This SPA fallback only catches routes with no prerendered file.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
